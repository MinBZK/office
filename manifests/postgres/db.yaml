apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: db
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3

  bootstrap:
    initdb:
      database: office
      owner: office
      secret:
        name: office-postgres-sec

  storage:
    storageClass: managed-csi-premium
    size: 2Gi

  enableSuperuserAccess: true
  superuserSecret:
    name: office-postgres-sec-super

  postgresql:
    parameters:
      shared_buffers: "128MB"

  resources:
    requests:
      memory: "1Gi"
      cpu: "300m"
