apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpl
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/instance: nextcloud
    app.kubernetes.io/component: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nextcloud
      app.kubernetes.io/instance: nextcloud
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nextcloud
        app.kubernetes.io/instance: nextcloud
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: nextcloud
          image: nextcloud:30.0.5-apache
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: "office"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: office-postgres-sec
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: office-postgres-sec
                  key: password
            - name: POSTGRES_HOST
              value: "office-postgres-db-rw:5432"
            - name: NEXTCLOUD_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: sec
                  key: nextcloud-username
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sec
                  key: nextcloud-password
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              value: files2.la-suite.apps.digilab.network
            - name: NEXTCLOUD_DATA_DIR
              value: "/var/www/html/data"
            # - name: OBJECTSTORE_S3_SSL
            #   value: "false"
            # - name: OBJECTSTORE_S3_AUTOCREATE
            #   value: "true"
            # - name: OBJECTSTORE_S3_REGION
            #   value: "eu-west-1"
            # - name: OBJECTSTORE_S3_PORT
            #   value: "9000"
            # - name: OBJECTSTORE_S3_STORAGE_CLASS
            #   value: "STANDARD"
            # - name: OBJECTSTORE_S3_USEPATH_STYLE
            #   value: "true"
            # - name: OBJECTSTORE_S3_HOST
            #   value: "office-minio-svc"
            # - name: OBJECTSTORE_S3_BUCKET
            #   value: "nextcloud"
            # - name: OBJECTSTORE_S3_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: office-minio-sec
            #       key: minio_root_user
            # - name: OBJECTSTORE_S3_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       name: office-minio-sec
            #       key: minio_root_password
            # - name: OBJECTSTORE_S3_SSE_C_KEY
            #   value: ""
            - name: REDIS_HOST
              value: "office-redis-svc"
            - name: SMTP_HOST
              value: "office-mailcatcher-svc"
            - name: SMTP_PORT
              value: "1025"
            - name: SMTP_AUTHTYPE
              value: "PLAIN"
            - name: MAIL_FROM_ADDRESS
              value: "no-reply@files2.la-suite.apps.digilab.network"
            - name: MAIL_DOMAIN
              value: "files2.la-suite.apps.digilab.network"  
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          # livenessProbe:
          #   httpGet:
          #     path: /status.php
          #     port:  80
          #     httpHeaders:
          #     - name: Host
          #       value: "files2.la-suite.apps.digilab.network"
          #   initialDelaySeconds: 10
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   successThreshold: 1
          #   failureThreshold: 3
          # readinessProbe:
          #   httpGet:
          #     path: /status.php
          #     port:  80
          #     httpHeaders:
          #     - name: Host
          #       value: "files2.la-suite.apps.digilab.network"
          #   initialDelaySeconds: 10
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   successThreshold: 1
          #   failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
          volumeMounts:
            - name: nextcloud-main
              mountPath: /var/www/
              subPath: root
            - name: nextcloud-main
              mountPath: /var/www/html
              subPath: html
            - name: nextcloud-main
              mountPath: /var/www/html/data
              subPath: data
            - name: nextcloud-main
              mountPath: /var/www/html/config
              subPath: config
            - name: nextcloud-main
              mountPath: /var/www/html/custom_apps
              subPath: custom_apps
            - name: nextcloud-main
              mountPath: /var/www/tmp
              subPath: tmp
            - name: nextcloud-main
              mountPath: /var/www/html/themes
              subPath: themes
      volumes:
        - name: nextcloud-main
          persistentVolumeClaim:
            claimName: pvc
      securityContext:
        # Will mount configuration files as www-data (id: 33) for nextcloud
        fsGroup: 33